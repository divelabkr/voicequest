<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>VoiceQuest</title>
<style>
:root{
  --primary:#0f6e56;--primary-ink:#fff;--primary-soft:#e4f0eb;
  --accent:#d85a30;--accent-ink:#fff;--accent-soft:#faece7;
  --paper:#faf7f2;--card:#fff;--ink:#2c2c2a;--muted:#5f5e5a;--hint:#888780;--line:#e5e0d8;
  --success:#27500a;--success-bg:#eaf3de;--error:#a32d2d;--error-bg:#fcebeb;--warn:#946011;--warn-bg:#f7efdc;
  --radius-md:14px;--radius-lg:20px;
}
*{box-sizing:border-box}
body{margin:0;background:var(--paper);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Noto Sans KR','Noto Sans JP',sans-serif;font-size:15px}
.wrap{max-width:480px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}
.center{flex:1;display:flex;flex-direction:column;justify-content:center;padding:24px}
h1{font-size:36px;font-weight:700;line-height:1.1;margin:0 0 6px}
.sub{color:var(--muted);margin-bottom:28px;line-height:1.6}
label.fld{display:block;font-size:13px;color:var(--muted);margin-bottom:6px}
input[type=text]{width:100%;background:var(--card);border:.5px solid var(--line);border-radius:var(--radius-md);padding:14px;font-size:17px;letter-spacing:2px;margin-bottom:22px;font-family:inherit;color:var(--ink)}
input[type=text]::placeholder{color:var(--hint)}
.crow{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.crow input{width:20px;height:20px;accent-color:var(--primary)}
.btn{width:100%;padding:14px 20px;border:none;border-radius:var(--radius-md);background:var(--primary);color:var(--primary-ink);font-size:16px;font-weight:700;cursor:pointer;font-family:inherit}
.btn.cta{background:var(--accent);color:var(--accent-ink)}
.btn:disabled{background:var(--line);color:var(--hint)}
.note{text-align:center;color:var(--hint);font-size:12px;margin-top:20px;line-height:1.6}
.err{color:var(--error);font-size:14px;margin-bottom:10px;min-height:18px}
.hdr{display:flex;justify-content:space-between;align-items:center;padding:16px;background:var(--card);border-bottom:.5px solid var(--line)}
.log{flex:1;overflow-y:auto;padding:14px}
.bubble{max-width:82%;padding:14px;border-radius:var(--radius-lg);margin:6px 0;line-height:1.9}
.npc{background:var(--card);border:.5px solid var(--line)}
.you{background:var(--primary);color:var(--primary-ink);margin-left:auto;line-height:1.4}
ruby rt{font-size:.5em;color:var(--hint)}
.you ruby rt{color:rgba(255,255,255,.7)}
.gloss{margin-top:8px;padding-top:8px;border-top:.5px solid var(--line);font-size:13px;color:var(--muted);line-height:1.6}
.mic{display:flex;align-items:center;justify-content:center;width:88px;height:88px;margin:18px auto;padding:0;border:none;border-radius:9999px;background:var(--accent);color:var(--accent-ink);font-size:13px;font-weight:700;line-height:1.2;text-align:center;cursor:pointer;font-family:inherit;box-shadow:0 6px 20px rgba(44,44,42,.18)}
.mic.rec{background:var(--error)}
.wrap{position:relative}
.loading{position:absolute;inset:0;background:var(--paper);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:22px;z-index:20}
.bowl{position:relative;font-size:64px;line-height:1}
.steam{position:absolute;top:-10px;width:5px;height:22px;background:linear-gradient(to top,rgba(201,196,186,0),rgba(201,196,186,.9));border-radius:3px;opacity:0;animation:steam 2.1s ease-in-out infinite}
.steam.s1{left:24px}.steam.s2{left:36px;animation-delay:.7s}.steam.s3{left:48px;animation-delay:1.4s}
@keyframes steam{0%{opacity:0;transform:translateY(6px) scaleY(.6)}45%{opacity:.8}100%{opacity:0;transform:translateY(-16px) scaleY(1.2)}}
.wave{display:flex;gap:7px;align-items:center;height:48px}
.wave i{display:block;width:7px;height:14px;background:var(--accent);border-radius:4px;animation:wv 1s ease-in-out infinite}
.wave i:nth-child(2){animation-delay:.12s}.wave i:nth-child(3){animation-delay:.24s}.wave i:nth-child(4){animation-delay:.36s}.wave i:nth-child(5){animation-delay:.48s}
@keyframes wv{0%,100%{height:14px}50%{height:46px}}
.ltext{color:var(--muted);font-size:15px}
.lbar{width:220px;height:6px;background:var(--line);border-radius:3px;overflow:hidden}
.lbar>div{height:100%;width:0;background:var(--accent);transition:width .2s ease}
</style>
</head>
<body>
<div class="wrap" id="app"></div>
<script>
const API = "";
const APP_VERSION = "0.0.1"; // 앱 버전 게이트 — server minAppVersion 미만이면 차단(kill switch)
function cmpVer(a,b){var pa=String(a).split('.').map(Number),pb=String(b).split('.').map(Number);for(var i=0;i<3;i++){var x=pa[i]||0,y=pb[i]||0;if(x!==y)return x<y?-1:1;}return 0;}
function gateView(min){document.getElementById('app').innerHTML='<div style="text-align:center;padding:70px 24px"><div style="font-size:40px">🔄</div><h2 style="margin:14px 0 6px">업데이트가 필요해요</h2><p class="sub">최신 버전(v'+min+')으로 업데이트해 주세요.<br>현재 v'+APP_VERSION+'은 더 이상 지원되지 않습니다.</p><button onclick="location.reload(true)" style="margin-top:18px">새로고침</button></div>';}
async function checkVersion(){try{var j=await(await fetch(API+'/health')).json();if(j.minAppVersion&&cmpVer(APP_VERSION,j.minAppVersion)<0){gateView(j.minAppVersion);return false;}}catch(e){}return true;}
// 에러 자동 관측 — 사용자 설명 없이 캡처해 server로 리포트(best-effort, 앱 안 멈춤). 복구 아님.
function reportError(k,m,w){try{fetch(API+'/client-error',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({kind:k,message:String(m).slice(0,240),where:w||'web'})}).catch(function(){});}catch(e){}}
window.addEventListener('error',function(e){reportError('client_js',(e.message||'')+' @'+((e.filename||'').split('/').pop())+':'+(e.lineno||''),'web');});
window.addEventListener('unhandledrejection',function(e){reportError('client_js','unhandled: '+((e.reason&&e.reason.message)||e.reason||''),'web');});
(function(){var _f=window.fetch;window.fetch=function(u){var p=_f.apply(this,arguments);if(String(u).indexOf('/client-error')<0)p.catch(function(err){reportError('client_fetch',String(err)+' '+u,'web');});return p;};})();
let userId = localStorage.getItem('vq_token') || null, rec = null, recChunks = [], currentEp = 'ep_01_daiki_diner', currentEpTitle = '다이키 · 라멘집', showFuri = localStorage.getItem('vq_furi') !== '0';

function el(html){ const d=document.createElement('div'); d.innerHTML=html.trim(); return d.firstChild; }
function furi(s){ return (s||'').replace(/([一-龯々〆ヶ]+)\(([ぁ-んァ-ヶー]+)\)/g,'<ruby>$1<rt>$2</rt></ruby>'); }
function toggleFuri(){ showFuri=!showFuri; localStorage.setItem('vq_furi',showFuri?'1':'0'); var b=document.getElementById('furiBtn'); if(b)b.textContent='가나 '+(showFuri?'ON':'OFF'); }
// 일본어 → 한글 발음(근사) — 초보 진입 보조. 가나 표 + 가타카나 정규화 + ん/촉음 받침·장음 생략·요음.
function yomiHangul(s){
  var T={あ:'아',い:'이',う:'우',え:'에',お:'오',か:'카',き:'키',く:'쿠',け:'케',こ:'코',さ:'사',し:'시',す:'스',せ:'세',そ:'소',た:'타',ち:'치',つ:'츠',て:'테',と:'토',な:'나',に:'니',ぬ:'누',ね:'네',の:'노',は:'하',ひ:'히',ふ:'후',へ:'헤',ほ:'호',ま:'마',み:'미',む:'무',め:'메',も:'모',や:'야',ゆ:'유',よ:'요',ら:'라',り:'리',る:'루',れ:'레',ろ:'로',わ:'와',を:'오',が:'가',ぎ:'기',ぐ:'구',げ:'게',ご:'고',ざ:'자',じ:'지',ず:'즈',ぜ:'제',ぞ:'조',だ:'다',ぢ:'지',づ:'즈',で:'데',ど:'도',ば:'바',び:'비',ぶ:'부',べ:'베',ぼ:'보',ぱ:'파',ぴ:'피',ぷ:'푸',ぺ:'페',ぽ:'포'};
  var Y={'ゃ':'야','ゅ':'유','ょ':'요'};
  function jong(ch,idx){ var c=ch.charCodeAt(0); if(c<0xAC00||c>0xD7A3||(c-0xAC00)%28!==0)return null; return String.fromCharCode(c+idx); }
  var out='', a=Array.from(s||'');
  for(var i=0;i<a.length;i++){
    var ch=a[i], code=ch.charCodeAt(0);
    if(code>=0x30A1&&code<=0x30F6) ch=String.fromCharCode(code-0x60); // 가타카나→히라가나
    if(ch==='ー') continue; // 장음 생략(근사)
    if(ch==='ん'){ var j=jong(out.slice(-1),4); out=j?out.slice(0,-1)+j:out+'ㄴ'; continue; }
    if(ch==='っ'){ var k=jong(out.slice(-1),19); if(k)out=out.slice(0,-1)+k; continue; }
    if(Y[ch]){ out=out.slice(0,-1)+Y[ch]; continue; }
    out+= T[ch]||'';
  }
  return out||s;
}
function showLoading(msg){
  var app=document.getElementById('app');
  var d=document.createElement('div'); d.className='loading'; d.id='loadingOv';
  d.innerHTML='<div class="bowl">🍜<span class="steam s1"></span><span class="steam s2"></span><span class="steam s3"></span></div>'
    +'<div class="wave"><i></i><i></i><i></i><i></i><i></i></div>'
    +'<div class="ltext">'+msg+'</div><div class="lbar"><div id="lbarFill"></div></div>';
  app.appendChild(d);
  var f=d.querySelector('#lbarFill'), p=0;
  d._t=setInterval(function(){ p=Math.min(92,p+Math.random()*16); f.style.width=p+'%'; },200);
}
function hideLoading(){ var d=document.getElementById('loadingOv'); if(!d)return; var f=d.querySelector('#lbarFill'); if(f)f.style.width='100%'; clearInterval(d._t); setTimeout(function(){d.remove();},260); }

function signupView(){
  const app = document.getElementById('app');
  app.innerHTML = '<div class="center">'
    + '<h1>VoiceQuest</h1>'
    + '<div class="sub">음성으로 일본어 대화 — 초대 코드로 시작해요.</div>'
    + '<label class="fld">초대 코드</label>'
    + '<input type="text" id="code" placeholder="VQ-XXXX-XXXX">'
    + '<div class="crow"><input type="checkbox" id="c1"><span>음성 처리를 위한 국외 이전(STT/TTS)에 동의 · <a href="'+API+'/legal/terms" target="_blank" rel="noopener" style="color:var(--primary)">이용약관</a></span></div>'
    + '<div class="crow"><input type="checkbox" id="c2"><span>개인정보 처리에 동의 · <a href="'+API+'/legal/privacy" target="_blank" rel="noopener" style="color:var(--primary)">개인정보처리방침</a></span></div>'
    + '<div class="err" id="err"></div>'
    + '<button class="btn cta" id="go" disabled>시작하기</button>'
    + '<div class="note">탈퇴 시 모든 대화 기록이 삭제됩니다(잊혀질 권리).</div>'
    + '</div>';
  const code=app.querySelector('#code'), c1=app.querySelector('#c1'), c2=app.querySelector('#c2'), go=app.querySelector('#go');
  function fmtCode(v){ var s=v.toUpperCase().replace(/[^A-Z0-9]/g,''); if(s.indexOf('VQ')===0)s=s.slice(2); s=s.slice(0,8); var p=['VQ']; if(s.length>0)p.push(s.slice(0,4)); if(s.length>4)p.push(s.slice(4,8)); return p.join('-'); } // 하이픈 자동(VQ-XXXX-XXXX)
  code.addEventListener('input',function(){ code.value=fmtCode(code.value); }); // 입력마다 하이픈 포맷
  var inv=new URLSearchParams(location.search).get('invite'); if(inv&&code){ code.value=fmtCode(inv); } // 초대 링크 자동 채움(바이럴 전환↑)+포맷
  function upd(){ go.disabled = !(code.value.trim() && c1.checked && c2.checked); }
  [code,c1,c2].forEach(function(e){ e.addEventListener('input',upd); e.addEventListener('change',upd); });
  go.onclick = async function(){
    go.disabled=true;
    const uid = 'web_'+((self.crypto&&crypto.randomUUID)?crypto.randomUUID():Date.now()+'_'+Math.random().toString(36).slice(2));
    try{
      const r = await fetch(API+'/auth/redeem',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({code:code.value.trim().toUpperCase(),userId:uid,consent:{overseasTransfer:true,dataProcessing:true}})});
      const j = await r.json();
      if(j.status==='active'&&j.token){ userId=j.token; localStorage.setItem('vq_token',j.token); (localStorage.getItem('vq_welcomed')?selectView():welcomeView()); } // 레드팀: 서버 발급 토큰 보관(userId 평문 bearer 폐기)
      else { app.querySelector('#err').textContent = j.error==='invite_not_found'?'유효하지 않은 코드예요':j.error==='invite_already_redeemed'?'이미 사용된 코드예요':j.error||'동의/정원을 확인하세요'; go.disabled=false; }
    }catch(e){ app.querySelector('#err').textContent='서버 연결 실패: '+e; go.disabled=false; }
  };
}
// ── 신규 온보딩 — 가입 직후 1회: 음성게이트·따라하기·안심 3줄 + 추천 CTA(흐름 가이드) ──
function welcomeView(){
  const app=document.getElementById('app');
  app.innerHTML='<div class="center"><h1>환영해요 👋</h1>'
    +'<div style="text-align:left;margin:18px 0 26px;line-height:1.6">'
    +'<div style="display:flex;gap:10px;align-items:flex-start;margin-bottom:14px"><span style="font-size:20px">🗣</span><span>VoiceQuest는 <b>말해야</b> 열려요. 버튼을 누르고 일본어로 말하면 진행돼요.</span></div>'
    +'<div style="display:flex;gap:10px;align-items:flex-start;margin-bottom:14px"><span style="font-size:20px">🔊</span><span>먼저 <b>따라하기</b>로 정답을 듣고 따라 말하며 입을 풀어요.</span></div>'
    +'<div style="display:flex;gap:10px;align-items:flex-start"><span style="font-size:20px">😊</span><span>틀려도 NPC가 분기로 받아주니 편하게 말해요.</span></div>'
    +'</div>'
    +'<button class="btn cta" onclick="markWelcomed();shadowSetup()">따라하기로 시작</button>'
    +'<button class="btn" style="margin-top:8px;background:var(--card);color:var(--muted);border:.5px solid var(--line)" onclick="markWelcomed();selectView()">자유롭게 둘러보기</button></div>';
}
function markWelcomed(){ try{ localStorage.setItem('vq_welcomed','1'); }catch(e){} }
function markPlayed(){ try{ localStorage.setItem('vq_played','1'); }catch(e){} }

function selectView(){
  const app=document.getElementById('app');
  var firstTime=!localStorage.getItem('vq_played');
  app.innerHTML='<div class="center"><h1>어디로 갈까요?</h1><div onclick="dailyView()" style="cursor:pointer;border:2px solid var(--primary);border-radius:var(--radius-md);padding:15px 16px;margin:0 0 18px;background:var(--primary-soft)"><b style="font-size:17px">🔥 오늘의 3마디</b><div class="sub" style="margin:4px 0 0;color:var(--primary)">1분 발화 연습 · 매일 스트릭</div></div><div onclick="shadowSetup()" style="cursor:pointer;border:.5px solid var(--accent);border-radius:var(--radius-md);padding:15px 16px;margin:0 0 18px;background:var(--accent-soft)"><b style="font-size:17px">🗣 따라하기</b>'+(firstTime?'<span style="font-size:11px;background:var(--accent);color:#fff;border-radius:9999px;padding:2px 8px;margin-left:6px">처음이면 여기부터</span>':'')+'<div class="sub" style="margin:4px 0 0;color:var(--accent)">정답을 듣고 따라 말하기 · 레벨·테마 선택</div></div><div onclick="freetalkView()" style="cursor:pointer;border:.5px solid var(--accent);border-radius:var(--radius-md);padding:15px 16px;margin:0 0 18px;background:var(--card)"><b style="font-size:17px">💬 다이키와 수다</b><div class="sub" style="margin:4px 0 0;color:var(--muted)">토픽에 자유롭게 대답 · 무료 10턴/일</div></div><div class="sub" style="margin-bottom:12px">또는 에피소드 모험</div><div id="epCards"><div class="sub">불러오는 중…</div></div></div>';
  fetch(API+'/episodes').then(function(r){return r.json()}).then(function(j){
    window._epAizu={};
    document.getElementById('epCards').innerHTML=(j.episodes||[]).map(function(e){
      window._epAizu[e.id]=e.aizuchi||[];
      return '<div onclick="startEp(\''+e.id+'\',\''+esc2(e.title).replace(/\x27/g,"")+'\')" style="cursor:pointer;border:.5px solid var(--line);border-radius:var(--radius-md);padding:15px 16px;margin:10px 0;background:var(--card)"><b style="font-size:17px">'+esc2(e.title)+'</b><div class="sub" style="margin:4px 0 0">'+esc2(e.character)+' · '+e.sceneCount+'씬 · NPC '+((e.npcs||[]).length)+'명'+(e.cached?' · 🔊 음성':' · 자막')+'</div></div>';
    }).join('')||'에피소드 없음';
  }).catch(function(){ document.getElementById('epCards').innerHTML='<div class="err">에피소드 로드 실패</div>'; });
}
function startEp(epId,title){ markPlayed(); currentEp=epId; currentEpTitle=title||epId; window._aizuchi=(window._epAizu||{})[epId]||[]; talkView(); }
async function dailyView(){
  const app=document.getElementById('app');
  app.innerHTML='<div class="center"><div class="sub">오늘의 3마디 불러오는 중…</div></div>';
  let d; try{ d=await (await fetch(API+'/daily?sid='+userId)).json(); }catch(e){ app.innerHTML='<div class="center"><div class="err">로드 실패</div></div>'; return; }
  window._daily={cards:d.cards||[], idx:0, streak:d.streak||0, done:0};
  dailyCard();
}
function dailyCard(){
  var st=window._daily;
  if(st.idx>=st.cards.length){ dailyDone(); return; }
  var c=st.cards[st.idx];
  const app=document.getElementById('app');
  app.innerHTML='<div class="center"><div class="sub">오늘의 3마디 · '+(st.idx+1)+'/'+st.cards.length+' · 🔥 '+st.streak+'</div>'
    +'<div style="font-size:26px;margin:26px 0 4px;font-weight:600">'+esc2(c.expression)+'</div>'
    +(showFuri?'<div style="font-size:15px;color:var(--primary);margin-bottom:6px">'+esc2(yomiHangul(c.yomi||c.expression))+'</div>':'')
    +'<div class="sub" style="margin-bottom:30px">'+esc2(c.meaning)+'</div>'
    +'<button class="mic" id="dmic">🎤 눌러서 따라 말하기</button>'
    +'<div id="dresult" style="margin-top:16px;min-height:26px"></div></div>';
  document.getElementById('dmic').onclick=dailyMic;
}
async function dailyMic(){
  var mic=document.getElementById('dmic');
  if(!rec){
    try{ const stream=await navigator.mediaDevices.getUserMedia({audio:true}); recChunks=[]; rec=new MediaRecorder(stream); rec.ondataavailable=function(e){if(e.data.size>0)recChunks.push(e.data)}; rec.start(); mic.textContent='■ 멈추고 채점'; mic.classList.add('rec'); }catch(e){ alert('마이크 권한이 필요해요'); }
    return;
  }
  mic.classList.remove('rec'); mic.textContent='채점 중…'; mic.disabled=true;
  var blob=await new Promise(function(res){ rec.onstop=function(){ rec.stream.getTracks().forEach(function(t){t.stop()}); res(new Blob(recChunks,{type:'audio/webm'})); }; rec.stop(); }); rec=null;
  var st=window._daily, c=st.cards[st.idx];
  try{
    var r=await fetch(API+'/daily/turn?sid='+userId+'&exp='+encodeURIComponent(c.expression),{method:'POST',headers:{'Content-Type':'application/octet-stream'},body:blob});
    var j=await r.json(); var ok=j.grade==='S'||j.grade==='A'||j.grade==='B';
    document.getElementById('dresult').innerHTML=(ok?'<span style="background:var(--success-bg);color:var(--success);font-weight:700;border-radius:9999px;padding:4px 10px">✓ '+j.grade+'</span>':'<span style="background:var(--error-bg);color:var(--error);font-weight:700;border-radius:9999px;padding:4px 10px">✗ 다시</span>')+' <span class="sub">들린 말: '+esc2(j.transcript||'(못 알아들음)')+'</span>';
    st.streak=j.streak; if(ok)st.done++;
    setTimeout(function(){ st.idx++; dailyCard(); },1700);
  }catch(e){ document.getElementById('dresult').textContent='오류: '+e; mic.disabled=false; mic.textContent='🎤 다시'; }
}
function dailyDone(){
  var st=window._daily; const app=document.getElementById('app');

function shadowPick(key,val){ var p=window._shParam; p[key]=(p[key]===val?null:val); shadowSetupRender(); }

async function shadowMic(){
  var mic=document.getElementById('smic');
  if(!rec){
    try{ const stream=await navigator.mediaDevices.getUserMedia({audio:true}); recChunks=[]; rec=new MediaRecorder(stream); rec.ondataavailable=function(e){if(e.data.size>0)recChunks.push(e.data)}; rec.start(); mic.textContent='■ 멈추고 채점'; mic.classList.add('rec'); }catch(e){ alert('마이크 권한이 필요해요'); }
    return;
  }
  mic.classList.remove('rec'); mic.textContent='채점 중…'; mic.disabled=true;
  var blob=await new Promise(function(res){ rec.onstop=function(){ rec.stream.getTracks().forEach(function(t){t.stop()}); res(new Blob(recChunks,{type:'audio/webm'})); }; rec.stop(); }); rec=null;
  var st=window._shadow, c=st.cards[st.idx];
  try{
    var r=await fetch(API+'/shadow/turn?sid='+userId+'&exp='+encodeURIComponent(c.expression),{method:'POST',headers:{'Content-Type':'application/octet-stream'},body:blob});

function addBubble(res){
  const log = document.getElementById('log');
  const esc = function(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); };
  // [m4] escape 후 ruby 태그만 화이트리스트로 생성 → 후리가나/대사 XSS 차단(향후 UGC 대비)
  let html = (showFuri && res.furigana)
    ? esc(res.furigana).replace(/([一-龯々〆ヶ]+)\(([ぁ-んァ-ヶー]+)\)/g,'<ruby>$1<rt>$2</rt></ruby>')
    : esc(res.npcLine);
  if(res.words && res.words.length){ html += '<div class="gloss">'+res.words.map(function(w){return esc(w.w)+' · '+esc(w.gloss);}).join('<br>')+'</div>'; }
  var spk=(res.speakerName&&!res.speakerIsMain)?'<div style="font-size:12px;color:var(--accent);margin-bottom:3px;font-weight:600">'+esc(res.speakerName)+'</div>':'';
  log.appendChild(el('<div class="bubble npc">'+spk+html+'</div>'));
  log.scrollTop=log.scrollHeight;
  var affEl=document.getElementById('aff'); var prevAff=window._prevAff||0;
  affEl.textContent='♥ '+res.affinity;
  if(res.affinity>prevAff && affEl.animate){ affEl.animate([{transform:'scale(1)'},{transform:'scale(1.5)'},{transform:'scale(1)'}],{duration:450}); }
  window._prevAff=res.affinity;
  if(res.progress){ var pe=document.getElementById('prog'); if(pe)pe.textContent='씬 '+res.progress.scene+'/'+res.progress.total+((res.timing&&res.grade&&res.grade!=='-')?(' · '+(res.timing.fast?'⚡':'🤖')+res.timing.ms+'ms'):''); }
  if(res.audioUrl && res.audioUrl.indexOf('/cache/')===0){ try{ new Audio(API+res.audioUrl).play(); }catch(e){} }
}

}

      rec.ondataavailable=function(e){ if(e.data.size>0) recChunks.push(e.data); };
      rec.start(); mic.textContent='■ 멈추고 전송'; mic.classList.add('rec');
    }catch(e){ alert('마이크 권한이 필요해요'); }
    return;
  }
  busy=true;
  mic.classList.remove('rec'); mic.textContent='🎤 눌러서 말하기';
  const blob = await new Promise(function(res){ rec.onstop=function(){ rec.stream.getTracks().forEach(function(t){t.stop();}); res(new Blob(recChunks,{type:'audio/webm'})); }; rec.stop(); });
  rec=null;
  const log=document.getElementById('log');
  log.appendChild(el('<div class="bubble you">(내 발화)</div>'));
  // §7 추임새 흡수 — 발화 끝 즉시 NPC 음성 추임새(うーん…)를 연쇄 재생하며 LLM 판정을 병렬로 돌린다.
  // fast(즉답)는 추임새 1개로 끝, 느린 LLM은 응답까지 추임새 연쇄 → 현재 추임새 끝나면 본 대사로 끊김 없이 이음.
  var aizu=window._aizuchi||[]; var aiStop=false, curAi=null;
  (function loopAi(i){ if(aiStop||!aizu.length)return; var a=new Audio(API+aizu[i%aizu.length]); a.playbackRate=1.2; curAi=a; a.onended=function(){ if(!aiStop)loopAi(i+1); }; a.play().catch(function(){}); })(0);
  var think=null; var AZ=['えーと…','うーん…','そうだね…','なるほど…']; var az=AZ[Math.floor(Math.random()*AZ.length)];
  var thinkT=setTimeout(function(){ think=el('<div class="bubble npc"><span style="opacity:.7">'+az+'</span> <span class="wave" style="height:14px;gap:4px"><i style="width:4px"></i><i style="width:4px"></i><i style="width:4px"></i></span></div>'); log.appendChild(think); log.scrollTop=log.scrollHeight; }, 380);
  try{ const res = await postTurn(blob); aiStop=true;
    if(curAi&&!curAi.ended&&!curAi.paused){ await new Promise(function(r){ var t=setInterval(function(){ try{curAi.volume=Math.max(0,curAi.volume-0.15);}catch(e){} if(!curAi||curAi.volume<=0||curAi.ended){ clearInterval(t); try{curAi.pause();}catch(e){} r(); } },40); setTimeout(function(){ clearInterval(t); try{curAi.pause();}catch(e){} r(); },420); }); } // 응답 오면 현재 추임새 ~0.4s 페이드아웃 후 본 대사(겹침 방지+자연 연결)
    clearTimeout(thinkT); if(think&&think.parentNode)think.remove(); addBubble(res); if(res.done){ setTimeout(resultView,1400); } else await advanceNpc(); }
  catch(e){ aiStop=true; clearTimeout(thinkT); if(think&&think.parentNode)think.remove(); log.appendChild(el('<div class="bubble npc">(오류) '+esc2(e)+'</div>')); }
  finally{ busy=false; }
}
function esc2(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); } // 레드팀: 따옴표 이스케이프(UGC XSS·onclick 보간 대비)

checkVersion().then(function(ok){ if(!ok) return; if(userId){ selectView(); } else { signupView(); } });
</script>
