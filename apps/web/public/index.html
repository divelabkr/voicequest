<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>VoiceQuest</title>
<style>
:root{--paper:#faf7f2;--card:#fff;--ink:#2c2c2a;--muted:#5f5e5a;--hint:#888780;--line:#e5e0d8;--blue:#185fa5;--pink:#d4537e}
*{box-sizing:border-box}
body{margin:0;background:var(--paper);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;font-size:16px}
.wrap{max-width:480px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}
.center{flex:1;display:flex;flex-direction:column;justify-content:center;padding:24px}
h1{font-size:28px;font-weight:600;margin:0 0 6px}
.sub{color:var(--muted);margin-bottom:28px}
label.fld{display:block;font-size:13px;color:var(--muted);margin-bottom:6px}
input[type=text]{width:100%;border:1px solid #cabfa9;border-radius:12px;padding:14px;font-size:17px;letter-spacing:2px;margin-bottom:22px;font-family:inherit}
.crow{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.crow input{width:20px;height:20px}
.btn{width:100%;padding:16px;border:none;border-radius:14px;background:var(--blue);color:#fff;font-size:16px;font-weight:500;cursor:pointer;font-family:inherit}
.btn:disabled{background:#b4b2a9}
.note{text-align:center;color:var(--hint);font-size:12px;margin-top:20px}
.err{color:#a32d2d;font-size:14px;margin-bottom:10px;min-height:18px}
.hdr{display:flex;justify-content:space-between;align-items:center;padding:16px;background:#fff;border-bottom:1px solid var(--line)}
.log{flex:1;overflow-y:auto;padding:14px}
.bubble{max-width:82%;padding:11px 13px;border-radius:13px;margin:6px 0;line-height:1.9}
.npc{background:#fff;border:1px solid var(--line)}
.you{background:#e6f1fb;margin-left:auto;line-height:1.4}
ruby rt{font-size:.5em;color:var(--hint)}
.gloss{margin-top:8px;padding-top:8px;border-top:1px solid var(--line);font-size:13px;color:var(--muted);line-height:1.6}
.mic{margin:16px;padding:16px;border:none;border-radius:14px;background:var(--blue);color:#fff;font-size:16px;font-weight:500;cursor:pointer;font-family:inherit}
.mic.rec{background:#a32d2d}
.wrap{position:relative}
.loading{position:absolute;inset:0;background:var(--paper);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:22px;z-index:20}
.bowl{position:relative;font-size:64px;line-height:1}
.steam{position:absolute;top:-10px;width:5px;height:22px;background:linear-gradient(to top,rgba(201,196,186,0),rgba(201,196,186,.9));border-radius:3px;opacity:0;animation:steam 2.1s ease-in-out infinite}
.steam.s1{left:24px}.steam.s2{left:36px;animation-delay:.7s}.steam.s3{left:48px;animation-delay:1.4s}
@keyframes steam{0%{opacity:0;transform:translateY(6px) scaleY(.6)}45%{opacity:.8}100%{opacity:0;transform:translateY(-16px) scaleY(1.2)}}
.wave{display:flex;gap:7px;align-items:center;height:48px}
.wave i{display:block;width:7px;height:14px;background:var(--blue);border-radius:4px;animation:wv 1s ease-in-out infinite}
.wave i:nth-child(2){animation-delay:.12s}.wave i:nth-child(3){animation-delay:.24s}.wave i:nth-child(4){animation-delay:.36s}.wave i:nth-child(5){animation-delay:.48s}
@keyframes wv{0%,100%{height:14px}50%{height:46px}}
.ltext{color:var(--muted);font-size:15px}
.lbar{width:220px;height:6px;background:var(--line);border-radius:3px;overflow:hidden}
.lbar>div{height:100%;width:0;background:var(--blue);transition:width .2s ease}
</style>
</head>
<body>
<div class="wrap" id="app"></div>
<script>
const API = "http://localhost:8787";
let userId = localStorage.getItem('vq_uid') || null, rec = null, recChunks = [], currentEp = 'ep_01_daiki_diner', currentEpTitle = 'лӢӨмқҙнӮӨ В· лқјл©ҳм§‘', showFuri = localStorage.getItem('vq_furi') !== '0';

function el(html){ const d=document.createElement('div'); d.innerHTML=html.trim(); return d.firstChild; }
function furi(s){ return (s||'').replace(/([дёҖ-йҫҜгҖ…гҖҶгғ¶]+)\(([гҒҒ-гӮ“гӮЎ-гғ¶гғј]+)\)/g,'<ruby>$1<rt>$2</rt></ruby>'); }
function toggleFuri(){ showFuri=!showFuri; localStorage.setItem('vq_furi',showFuri?'1':'0'); var b=document.getElementById('furiBtn'); if(b)b.textContent='к°ҖлӮҳ '+(showFuri?'ON':'OFF'); }
// мқјліём–ҙ вҶ’ н•ңкёҖ л°ңмқҢ(к·јмӮ¬) вҖ” мҙҲліҙ м§„мһ… ліҙмЎ°. к°ҖлӮҳ н‘ң + к°ҖнғҖм№ҙлӮҳ м •к·ңнҷ” + гӮ“/мҙүмқҢ л°ӣм№ЁВ·мһҘмқҢ мғқлһөВ·мҡ”мқҢ.
function yomiHangul(s){
  var T={гҒӮ:'м•„',гҒ„:'мқҙ',гҒҶ:'мҡ°',гҒҲ:'м—җ',гҒҠ:'мҳӨ',гҒӢ:'м№ҙ',гҒҚ:'нӮӨ',гҒҸ:'мҝ ',гҒ‘:'мјҖ',гҒ“:'мҪ”',гҒ•:'мӮ¬',гҒ—:'мӢң',гҒҷ:'мҠӨ',гҒӣ:'м„ё',гҒқ:'мҶҢ',гҒҹ:'нғҖ',гҒЎ:'м№ҳ',гҒӨ:'мё ',гҒҰ:'н…Ң',гҒЁ:'нҶ ',гҒӘ:'лӮҳ',гҒ«:'лӢҲ',гҒ¬:'лҲ„',гҒӯ:'л„Ө',гҒ®:'л…ё',гҒҜ:'н•ҳ',гҒІ:'нһҲ',гҒө:'нӣ„',гҒё:'н—Ө',гҒ»:'нҳё',гҒҫ:'л§Ҳ',гҒҝ:'лҜё',гӮҖ:'л¬ҙ',гӮҒ:'л©”',гӮӮ:'лӘЁ',гӮ„:'м•ј',гӮҶ:'мң ',гӮҲ:'мҡ”',гӮү:'лқј',гӮҠ:'лҰ¬',гӮӢ:'лЈЁ',гӮҢ:'л Ҳ',гӮҚ:'лЎң',гӮҸ:'мҷҖ',гӮ’:'мҳӨ',гҒҢ:'к°Җ',гҒҺ:'кё°',гҒҗ:'кө¬',гҒ’:'кІҢ',гҒ”:'кі ',гҒ–:'мһҗ',гҒҳ:'м§Җ',гҒҡ:'мҰҲ',гҒң:'м ң',гҒһ:'мЎ°',гҒ :'лӢӨ',гҒў:'м§Җ',гҒҘ:'мҰҲ',гҒ§:'лҚ°',гҒ©:'лҸ„',гҒ°:'л°”',гҒі:'л№„',гҒ¶:'л¶Җ',гҒ№:'лІ ',гҒј:'ліҙ',гҒұ:'нҢҢ',гҒҙ:'н”ј',гҒ·:'н‘ё',гҒә:'нҺҳ',гҒҪ:'нҸ¬'};
  var Y={'гӮғ':'м•ј','гӮ…':'мң ','гӮҮ':'мҡ”'};
  function jong(ch,idx){ var c=ch.charCodeAt(0); if(c<0xAC00||c>0xD7A3||(c-0xAC00)%28!==0)return null; return String.fromCharCode(c+idx); }
  var out='', a=Array.from(s||'');
  for(var i=0;i<a.length;i++){
    var ch=a[i], code=ch.charCodeAt(0);
    if(code>=0x30A1&&code<=0x30F6) ch=String.fromCharCode(code-0x60); // к°ҖнғҖм№ҙлӮҳвҶ’нһҲлқјк°ҖлӮҳ
    if(ch==='гғј') continue; // мһҘмқҢ мғқлһө(к·јмӮ¬)
    if(ch==='гӮ“'){ var j=jong(out.slice(-1),4); out=j?out.slice(0,-1)+j:out+'г„ҙ'; continue; }
    if(ch==='гҒЈ'){ var k=jong(out.slice(-1),19); if(k)out=out.slice(0,-1)+k; continue; }
    if(Y[ch]){ out=out.slice(0,-1)+Y[ch]; continue; }
    out+= T[ch]||'';
  }
  return out||s;
}
function showLoading(msg){
  var app=document.getElementById('app');
  var d=document.createElement('div'); d.className='loading'; d.id='loadingOv';
  d.innerHTML='<div class="bowl">рҹҚң<span class="steam s1"></span><span class="steam s2"></span><span class="steam s3"></span></div>'
    +'<div class="wave"><i></i><i></i><i></i><i></i><i></i></div>'
    +'<div class="ltext">'+msg+'</div><div class="lbar"><div id="lbarFill"></div></div>';
  app.appendChild(d);
  var f=d.querySelector('#lbarFill'), p=0;
  d._t=setInterval(function(){ p=Math.min(92,p+Math.random()*16); f.style.width=p+'%'; },200);
}
function hideLoading(){ var d=document.getElementById('loadingOv'); if(!d)return; var f=d.querySelector('#lbarFill'); if(f)f.style.width='100%'; clearInterval(d._t); setTimeout(function(){d.remove();},260); }

function signupView(){
  const app = document.getElementById('app');
  app.innerHTML = '<div class="center">'
    + '<h1>VoiceQuest</h1>'
    + '<div class="sub">мқҢм„ұмңјлЎң мқјліём–ҙ лҢҖнҷ” вҖ” мҙҲлҢҖ мҪ”л“ңлЎң мӢңмһ‘н•ҙмҡ”.</div>'
    + '<label class="fld">мҙҲлҢҖ мҪ”л“ң</label>'
    + '<input type="text" id="code" placeholder="VQ-XXXX-XXXX">'
    + '<div class="crow"><input type="checkbox" id="c1"><span>мқҢм„ұ мІҳлҰ¬лҘј мң„н•ң көӯмҷё мқҙм „(STT/TTS)м—җ лҸҷмқҳ</span></div>'
    + '<div class="crow"><input type="checkbox" id="c2"><span>к°ңмқём •ліҙ мІҳлҰ¬м—җ лҸҷмқҳ</span></div>'
    + '<div class="err" id="err"></div>'
    + '<button class="btn" id="go" disabled>мӢңмһ‘н•ҳкё°</button>'
    + '<div class="note">нғҲнҮҙ мӢң лӘЁл“  лҢҖнҷ” кё°лЎқмқҙ мӮӯм ңлҗ©лӢҲлӢӨ(мһҠнҳҖм§Ҳ к¶ҢлҰ¬).</div>'
    + '</div>';
  const code=app.querySelector('#code'), c1=app.querySelector('#c1'), c2=app.querySelector('#c2'), go=app.querySelector('#go');
  function upd(){ go.disabled = !(code.value.trim() && c1.checked && c2.checked); }
  [code,c1,c2].forEach(function(e){ e.addEventListener('input',upd); e.addEventListener('change',upd); });
  go.onclick = async function(){
    go.disabled=true;
    const uid = 'web_'+((self.crypto&&crypto.randomUUID)?crypto.randomUUID():Date.now()+'_'+Math.random().toString(36).slice(2));
    try{
      const r = await fetch(API+'/auth/redeem',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({code:code.value.trim().toUpperCase(),userId:uid,consent:{overseasTransfer:true,dataProcessing:true}})});
      const j = await r.json();
      if(j.status==='active'){ userId=uid; localStorage.setItem('vq_uid',uid); selectView(); }
      else { app.querySelector('#err').textContent = j.error==='invite_not_found'?'мң нҡЁн•ҳм§Җ м•ҠмқҖ мҪ”л“ңмҳҲмҡ”':j.error==='invite_already_redeemed'?'мқҙлҜё мӮ¬мҡ©лҗң мҪ”л“ңмҳҲмҡ”':j.error||'лҸҷмқҳ/м •мӣҗмқ„ нҷ•мқён•ҳм„ёмҡ”'; go.disabled=false; }
    }catch(e){ app.querySelector('#err').textContent='м„ңлІ„ м—°кІ° мӢӨнҢЁ: '+e; go.disabled=false; }
  };
}

function selectView(){
  const app=document.getElementById('app');
  app.innerHTML='<div class="center"><h1>м–ҙл””лЎң к°Ҳк№Ңмҡ”?</h1><div onclick="dailyView()" style="cursor:pointer;border:2px solid var(--blue);border-radius:14px;padding:15px 16px;margin:0 0 18px;background:#e6f1fb"><b style="font-size:17px">рҹ”Ҙ мҳӨлҠҳмқҳ 3л§Ҳл””</b><div class="sub" style="margin:4px 0 0;color:#0c447c">1л¶„ л°ңнҷ” м—°мҠө В· л§Өмқј мҠӨнҠёлҰӯ</div></div><div class="sub" style="margin-bottom:12px">лҳҗлҠ” м—җн”јмҶҢл“ң лӘЁн—ҳ</div><div id="epCards"><div class="sub">л¶Ҳлҹ¬мҳӨлҠ” мӨ‘вҖҰ</div></div></div>';
  fetch(API+'/episodes').then(function(r){return r.json()}).then(function(j){
    window._epAizu={};
    document.getElementById('epCards').innerHTML=(j.episodes||[]).map(function(e){
      window._epAizu[e.id]=e.aizuchi||[];
      return '<div onclick="startEp(\''+e.id+'\',\''+esc2(e.title).replace(/\x27/g,"")+'\')" style="cursor:pointer;border:1px solid var(--line);border-radius:14px;padding:15px 16px;margin:10px 0;background:#fff"><b style="font-size:17px">'+esc2(e.title)+'</b><div class="sub" style="margin:4px 0 0">'+esc2(e.character)+' В· '+e.sceneCount+'м”¬ В· NPC '+((e.npcs||[]).length)+'лӘ…'+(e.cached?' В· рҹ”Ҡ мқҢм„ұ':' В· мһҗл§ү')+'</div></div>';
    }).join('')||'м—җн”јмҶҢл“ң м—ҶмқҢ';
  }).catch(function(){ document.getElementById('epCards').innerHTML='<div class="err">м—җн”јмҶҢл“ң лЎңл“ң мӢӨнҢЁ</div>'; });
}
function startEp(epId,title){ currentEp=epId; currentEpTitle=title||epId; window._aizuchi=(window._epAizu||{})[epId]||[]; talkView(); }
async function dailyView(){
  const app=document.getElementById('app');
  app.innerHTML='<div class="center"><div class="sub">мҳӨлҠҳмқҳ 3л§Ҳл”” л¶Ҳлҹ¬мҳӨлҠ” мӨ‘вҖҰ</div></div>';
  let d; try{ d=await (await fetch(API+'/daily?sid='+userId)).json(); }catch(e){ app.innerHTML='<div class="center"><div class="err">лЎңл“ң мӢӨнҢЁ</div></div>'; return; }
  window._daily={cards:d.cards||[], idx:0, streak:d.streak||0, done:0};
  dailyCard();
}
function dailyCard(){
  var st=window._daily;
  if(st.idx>=st.cards.length){ dailyDone(); return; }
  var c=st.cards[st.idx];
  const app=document.getElementById('app');
  app.innerHTML='<div class="center"><div class="sub">мҳӨлҠҳмқҳ 3л§Ҳл”” В· '+(st.idx+1)+'/'+st.cards.length+' В· рҹ”Ҙ '+st.streak+'</div>'
    +'<div style="font-size:26px;margin:26px 0 4px;font-weight:600">'+esc2(c.expression)+'</div>'
    +(showFuri?'<div style="font-size:15px;color:var(--blue);margin-bottom:6px">'+esc2(yomiHangul(c.yomi||c.expression))+'</div>':'')
    +'<div class="sub" style="margin-bottom:30px">'+esc2(c.meaning)+'</div>'
    +'<button class="mic" id="dmic">рҹҺӨ лҲҢлҹ¬м„ң л”°лқј л§җн•ҳкё°</button>'
    +'<div id="dresult" style="margin-top:16px;min-height:26px"></div></div>';
  document.getElementById('dmic').onclick=dailyMic;
}
async function dailyMic(){
  var mic=document.getElementById('dmic');
  if(!rec){
    try{ const stream=await navigator.mediaDevices.getUserMedia({audio:true}); recChunks=[]; rec=new MediaRecorder(stream); rec.ondataavailable=function(e){if(e.data.size>0)recChunks.push(e.data)}; rec.start(); mic.textContent='в–  л©Ҳм¶”кі  мұ„м җ'; mic.classList.add('rec'); }catch(e){ alert('л§ҲмқҙнҒ¬ к¶Ңн•ңмқҙ н•„мҡ”н•ҙмҡ”'); }
    return;
  }
  mic.classList.remove('rec'); mic.textContent='мұ„м җ мӨ‘вҖҰ'; mic.disabled=true;
  var blob=await new Promise(function(res){ rec.onstop=function(){ rec.stream.getTracks().forEach(function(t){t.stop()}); res(new Blob(recChunks,{type:'audio/webm'})); }; rec.stop(); }); rec=null;
  var st=window._daily, c=st.cards[st.idx];
  try{
    var r=await fetch(API+'/daily/turn?sid='+userId+'&exp='+encodeURIComponent(c.expression),{method:'POST',headers:{'Content-Type':'application/octet-stream'},body:blob});
    var j=await r.json(); var ok=j.grade==='S'||j.grade==='A'||j.grade==='B';
    document.getElementById('dresult').innerHTML=(ok?'<span style="color:var(--blue);font-weight:600">вң“ '+j.grade+'</span>':'<span style="color:#a32d2d;font-weight:600">вң— лӢӨмӢң</span>')+' <span class="sub">л“ӨлҰ° л§җ: '+esc2(j.transcript||'(лӘ» м•Ңм•„л“ӨмқҢ)')+'</span>';
    st.streak=j.streak; if(ok)st.done++;
    setTimeout(function(){ st.idx++; dailyCard(); },1700);
  }catch(e){ document.getElementById('dresult').textContent='мҳӨлҘҳ: '+e; mic.disabled=false; mic.textContent='рҹҺӨ лӢӨмӢң'; }
}
function dailyDone(){
  var st=window._daily; const app=document.getElementById('app');
  app.innerHTML='<div class="center" style="text-align:center"><h1>рҹ”Ҙ '+st.streak+'мқјм§ё</h1><div class="sub" style="margin-bottom:6px">мҳӨлҠҳмқҳ 3л§Ҳл”” мҷ„лЈҢ</div><div style="font-size:22px;margin:10px 0">'+st.done+' / '+st.cards.length+' м •лӢө</div><button class="btn" style="margin-top:20px" onclick="selectView()">лҸҢм•„к°Җкё°</button></div>';
}
function talkView(){
  const app = document.getElementById('app');
  app.innerHTML = '<div class="hdr"><b>'+esc2(currentEpTitle)+'</b><span><span id="prog" class="sub" style="margin-right:10px"></span><button id="furiBtn" onclick="toggleFuri()" style="border:1px solid var(--line);background:#fff;border-radius:8px;padding:4px 10px;font-size:12px;margin-right:10px;cursor:pointer">к°ҖлӮҳ '+(showFuri?"ON":"OFF")+'</button><span id="aff" style="color:var(--pink)">вҷҘ 0</span></span></div>'
    + '<div class="log" id="log"><button class="btn" style="max-width:200px;margin:30px auto;display:block" id="enter">мһ…мһҘн•ҳкё°</button></div>'
    + '<button class="mic" id="mic" style="display:none">рҹҺӨ лҲҢлҹ¬м„ң л§җн•ҳкё°</button>';
  app.querySelector('#enter').onclick = enter;
  app.querySelector('#mic').onclick = onMic;
}

async function resultView(){
  const app=document.getElementById('app');
  app.innerHTML='<div class="center"><div class="sub">кІ°кіј м •лҰ¬ мӨ‘вҖҰ</div></div>';
  let rm={}; try{ rm=await (await fetch(API+'/session/result?sid='+userId)).json(); }catch(e){}
  const aff=Object.values(rm.affinity||{})[0]||0;
  const n=aff>=6?3:aff>=3?2:1;
  const stars='вҳ…вҳ…вҳ…вҳҶвҳҶ'.slice(3-n,6-n);
  const s6=rm.stats6||{};
  const L={pronunciation:'л°ңмқҢ',vocabulary:'м–ҙнңҳ',grammar:'л¬ёлІ•',naturalness:'мһҗм—°лҸ„',speed:'мҶҚлҸ„',challenge:'лҸ„м „'};
  const bars=Object.keys(L).map(function(k){var v=Math.round(s6[k]||0);return '<div style="margin:7px 0"><div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:3px"><span>'+L[k]+'</span><span style="color:var(--muted)">'+v+'</span></div><div style="height:7px;background:#eee;border-radius:4px;overflow:hidden"><div style="height:100%;width:'+Math.min(100,v)+'%;background:var(--blue)"></div></div></div>'}).join('');
  const ex=rm.examReadiness||{};
  const jlpt=(ex.jlpt&&ex.jlpt.estimated)||'-';
  const opic=(ex.opic&&ex.opic.estimated)||'-';
  app.innerHTML='<div class="center" style="text-align:center"><h1>мҷ„мЈј!</h1><div class="sub">'+esc2(currentEpTitle)+'</div>'
    +'<div style="font-size:38px;color:var(--pink);letter-spacing:4px;margin:14px 0">'+stars+'</div>'
    +'<div class="sub" style="margin-bottom:18px">нҳёк°җлҸ„ вҷҘ '+aff+'</div>'
    +'<div style="text-align:left;margin:0 0 20px">'+bars+'</div>'
    +'<div style="display:flex;gap:10px;justify-content:center;margin-bottom:22px"><div style="background:#e6f1fb;color:#0c447c;padding:10px 18px;border-radius:12px;font-size:14px">JLPT м¶”м •<br><b style="font-size:18px">'+jlpt+'</b></div><div style="background:#fbeaf0;color:#72243e;padding:10px 18px;border-radius:12px;font-size:14px">OPIc<br><b style="font-size:18px">'+opic+'</b></div></div>'
    +'<button class="btn" onclick="location.reload()">лӢӨмӢң н•ҳкё°</button></div>';
}

function addBubble(res){
  const log = document.getElementById('log');
  const esc = function(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); };
  // [m4] escape нӣ„ ruby нғңк·ёл§Ң нҷ”мқҙнҠёлҰ¬мҠӨнҠёлЎң мғқм„ұ вҶ’ нӣ„лҰ¬к°ҖлӮҳ/лҢҖмӮ¬ XSS м°ЁлӢЁ(н–Ҙнӣ„ UGC лҢҖл№„)
  let html = (showFuri && res.furigana)
    ? esc(res.furigana).replace(/([дёҖ-йҫҜгҖ…гҖҶгғ¶]+)\(([гҒҒ-гӮ“гӮЎ-гғ¶гғј]+)\)/g,'<ruby>$1<rt>$2</rt></ruby>')
    : esc(res.npcLine);
  if(res.words && res.words.length){ html += '<div class="gloss">'+res.words.map(function(w){return esc(w.w)+' В· '+esc(w.gloss);}).join('<br>')+'</div>'; }
  var spk=(res.speakerName&&!res.speakerIsMain)?'<div style="font-size:12px;color:var(--pink);margin-bottom:3px;font-weight:500">'+esc(res.speakerName)+'</div>':'';
  log.appendChild(el('<div class="bubble npc">'+spk+html+'</div>'));
  log.scrollTop=log.scrollHeight;
  var affEl=document.getElementById('aff'); var prevAff=window._prevAff||0;
  affEl.textContent='вҷҘ '+res.affinity;
  if(res.affinity>prevAff && affEl.animate){ affEl.animate([{transform:'scale(1)'},{transform:'scale(1.5)'},{transform:'scale(1)'}],{duration:450}); }
  window._prevAff=res.affinity;
  if(res.progress){ var pe=document.getElementById('prog'); if(pe)pe.textContent='м”¬ '+res.progress.scene+'/'+res.progress.total+((res.timing&&res.grade&&res.grade!=='-')?(' В· '+(res.timing.fast?'вҡЎ':'рҹӨ–')+res.timing.ms+'ms'):''); }
  if(res.audioUrl && res.audioUrl.indexOf('/cache/')===0){ try{ new Audio(API+res.audioUrl).play(); }catch(e){} }
}

async function postTurn(blob){
  const r = await fetch(API+'/session/turn?sid='+userId+'&ep='+currentEp,{method:'POST',headers:{'Content-Type':'application/octet-stream'},body: blob||new Uint8Array(0)});
  return r.json();
}
async function advanceNpc(){
  for(let i=0;i<6;i++){ const res=await postTurn(null); if(res.awaitsUser||res.done){ document.getElementById('aff').textContent='вҷҘ '+res.affinity; if(res.done) setTimeout(resultView,1400); break; } addBubble(res); }
}
async function enter(){
  document.getElementById('enter').remove();
  showLoading(currentEpTitle+' мӨҖл№„ мӨ‘вҖҰ'); // мһ…мһҘ мӨҖл№„ вҖ” мәҗмӢңВ·мһҗмӮ° лЎңл”©(В§7 л Ҳмқҙн„ҙмӢң нқЎмҲҳ)
  var t0=Date.now();
  await advanceNpc();
  var el2=Date.now()-t0; if(el2<1500) await new Promise(function(r){setTimeout(r,1500-el2);}); // мөңмҶҢ н‘ңмӢң(м—°м¶ң)
  hideLoading();
  document.getElementById('mic').style.display='block';
  // в‘§ мІ« мһ…мһҘ мҳЁліҙл”© вҖ” л§ҲмқҙнҒ¬ мӮ¬мҡ©лІ• 1нҡҢ м•ҲлӮҙ(В§5 мқҢм„ұ кІҢмқҙнҠёк°Җ мң мқј мһ…л Ҙ)
  if(!localStorage.getItem('vq_onboarded')){
    document.getElementById('log').appendChild(el('<div class="bubble npc" style="background:#fff8e1;border-color:#f0d775">рҹҺӨ м•„лһҳ лІ„нҠјмқ„ лҲ„лҘҙкі  мқјліём–ҙлЎң л§җн•ҙліҙм„ёмҡ”. мһҳ м•Ҳ л“Өл ӨлҸ„ NPCк°Җ л¶„кё°лЎң л°ӣм•„мӨҳмҡ”.</div>'));
    document.getElementById('log').scrollTop=document.getElementById('log').scrollHeight;
    localStorage.setItem('vq_onboarded','1');
  }
}
let busy = false;
async function onMic(){
  const mic = document.getElementById('mic');
  if(busy) return; // [m3] мІҳлҰ¬ мӨ‘ мһ¬м§„мһ…(VAD мһҗлҸҷм •м§Җ + лІ„нҠј лҸҷмӢң) м°ЁлӢЁ вҶ’ л№Ҳ Blob м „мҶЎ л°©м§Җ
  if(!rec){
    try{
      const stream = await navigator.mediaDevices.getUserMedia({audio:true});
      recChunks=[]; rec=new MediaRecorder(stream);
      rec.ondataavailable=function(e){ if(e.data.size>0) recChunks.push(e.data); };
      rec.start(); mic.textContent='в–  л©Ҳм¶”кі  м „мҶЎ'; mic.classList.add('rec');
    }catch(e){ alert('л§ҲмқҙнҒ¬ к¶Ңн•ңмқҙ н•„мҡ”н•ҙмҡ”'); }
    return;
  }
  busy=true;
  mic.classList.remove('rec'); mic.textContent='рҹҺӨ лҲҢлҹ¬м„ң л§җн•ҳкё°';
  const blob = await new Promise(function(res){ rec.onstop=function(){ rec.stream.getTracks().forEach(function(t){t.stop();}); res(new Blob(recChunks,{type:'audio/webm'})); }; rec.stop(); });
  rec=null;
  const log=document.getElementById('log');
  log.appendChild(el('<div class="bubble you">(лӮҙ л°ңнҷ”)</div>'));
  // В§7 м¶”мһ„мғҲ нқЎмҲҳ вҖ” л°ңнҷ” лҒқ мҰүмӢң NPC мқҢм„ұ м¶”мһ„мғҲ(гҒҶгғјгӮ“вҖҰ)лҘј м—°мҮ„ мһ¬мғқн•ҳл©° LLM нҢҗм •мқ„ лі‘л ¬лЎң лҸҢлҰ°лӢӨ.
  // fast(мҰүлӢө)лҠ” м¶”мһ„мғҲ 1к°ңлЎң лҒқ, лҠҗлҰ° LLMмқҖ мқ‘лӢөк№Ңм§Җ м¶”мһ„мғҲ м—°мҮ„ вҶ’ нҳ„мһ¬ м¶”мһ„мғҲ лҒқлӮҳл©ҙ ліё лҢҖмӮ¬лЎң лҒҠк№Җ м—Ҷмқҙ мқҙмқҢ.
  var aizu=window._aizuchi||[]; var aiStop=false, curAi=null;
  (function loopAi(i){ if(aiStop||!aizu.length)return; var a=new Audio(API+aizu[i%aizu.length]); curAi=a; a.onended=function(){ if(!aiStop)loopAi(i+1); }; a.play().catch(function(){}); })(0);
  var think=null; var AZ=['гҒҲгғјгҒЁвҖҰ','гҒҶгғјгӮ“вҖҰ','гҒқгҒҶгҒ гҒӯвҖҰ','гҒӘгӮӢгҒ»гҒ©вҖҰ']; var az=AZ[Math.floor(Math.random()*AZ.length)];
  var thinkT=setTimeout(function(){ think=el('<div class="bubble npc"><span style="opacity:.7">'+az+'</span> <span class="wave" style="height:14px;gap:4px"><i style="width:4px"></i><i style="width:4px"></i><i style="width:4px"></i></span></div>'); log.appendChild(think); log.scrollTop=log.scrollHeight; }, 380);
  try{ const res = await postTurn(blob); aiStop=true;
    if(curAi&&!curAi.ended&&!curAi.paused){ await new Promise(function(r){ curAi.addEventListener('ended',r,{once:true}); setTimeout(r,900); }); } // нҳ„мһ¬ м¶”мһ„мғҲ лҒқлӮҳл©ҙ ліё лҢҖмӮ¬(мһҗм—° м—°кІ°)
    clearTimeout(thinkT); if(think&&think.parentNode)think.remove(); addBubble(res); if(res.done){ setTimeout(resultView,1400); } else await advanceNpc(); }
  catch(e){ aiStop=true; clearTimeout(thinkT); if(think&&think.parentNode)think.remove(); log.appendChild(el('<div class="bubble npc">(мҳӨлҘҳ) '+esc2(e)+'</div>')); }
  finally{ busy=false; }
}
function esc2(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

if(userId){ selectView(); } else { signupView(); }
</script>
