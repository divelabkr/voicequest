<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>VoiceQuest</title>
<style>
:root{--paper:#faf7f2;--card:#fff;--ink:#2c2c2a;--muted:#5f5e5a;--hint:#888780;--line:#e5e0d8;--blue:#185fa5;--pink:#d4537e}
*{box-sizing:border-box}
body{margin:0;background:var(--paper);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;font-size:16px}
.wrap{max-width:480px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}
.center{flex:1;display:flex;flex-direction:column;justify-content:center;padding:24px}
h1{font-size:28px;font-weight:600;margin:0 0 6px}
.sub{color:var(--muted);margin-bottom:28px}
label.fld{display:block;font-size:13px;color:var(--muted);margin-bottom:6px}
input[type=text]{width:100%;border:1px solid #cabfa9;border-radius:12px;padding:14px;font-size:17px;letter-spacing:2px;margin-bottom:22px;font-family:inherit}
.crow{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.crow input{width:20px;height:20px}
.btn{width:100%;padding:16px;border:none;border-radius:14px;background:var(--blue);color:#fff;font-size:16px;font-weight:500;cursor:pointer;font-family:inherit}
.btn:disabled{background:#b4b2a9}
.note{text-align:center;color:var(--hint);font-size:12px;margin-top:20px}
.err{color:#a32d2d;font-size:14px;margin-bottom:10px;min-height:18px}
.hdr{display:flex;justify-content:space-between;align-items:center;padding:16px;background:#fff;border-bottom:1px solid var(--line)}
.log{flex:1;overflow-y:auto;padding:14px}
.bubble{max-width:82%;padding:11px 13px;border-radius:13px;margin:6px 0;line-height:1.9}
.npc{background:#fff;border:1px solid var(--line)}
.you{background:#e6f1fb;margin-left:auto;line-height:1.4}
ruby rt{font-size:.5em;color:var(--hint)}
.gloss{margin-top:8px;padding-top:8px;border-top:1px solid var(--line);font-size:13px;color:var(--muted);line-height:1.6}
.mic{margin:16px;padding:16px;border:none;border-radius:14px;background:var(--blue);color:#fff;font-size:16px;font-weight:500;cursor:pointer;font-family:inherit}
.mic.rec{background:#a32d2d}
</style>
</head>
<body>
<div class="wrap" id="app"></div>
<script>
const API = "http://localhost:8787";
let userId = null, rec = null, recChunks = [];

function el(html){ const d=document.createElement('div'); d.innerHTML=html.trim(); return d.firstChild; }
function furi(s){ return (s||'').replace(/([一-龯々〆ヶ]+)\(([ぁ-んァ-ヶー]+)\)/g,'<ruby>$1<rt>$2</rt></ruby>'); }

function signupView(){
  const app = document.getElementById('app');
  app.innerHTML = '<div class="center">'
    + '<h1>VoiceQuest</h1>'
    + '<div class="sub">음성으로 일본어 대화 — 초대 코드로 시작해요.</div>'
    + '<label class="fld">초대 코드</label>'
    + '<input type="text" id="code" placeholder="VQ-XXXX-XXXX">'
    + '<div class="crow"><input type="checkbox" id="c1"><span>음성 처리를 위한 국외 이전(STT/TTS)에 동의</span></div>'
    + '<div class="crow"><input type="checkbox" id="c2"><span>개인정보 처리에 동의</span></div>'
    + '<div class="err" id="err"></div>'
    + '<button class="btn" id="go" disabled>시작하기</button>'
    + '<div class="note">탈퇴 시 모든 대화 기록이 삭제됩니다(잊혀질 권리).</div>'
    + '</div>';
  const code=app.querySelector('#code'), c1=app.querySelector('#c1'), c2=app.querySelector('#c2'), go=app.querySelector('#go');
  function upd(){ go.disabled = !(code.value.trim() && c1.checked && c2.checked); }
  [code,c1,c2].forEach(function(e){ e.addEventListener('input',upd); e.addEventListener('change',upd); });
  go.onclick = async function(){
    go.disabled=true;
    const uid = 'web_'+((self.crypto&&crypto.randomUUID)?crypto.randomUUID():Date.now()+'_'+Math.random().toString(36).slice(2));
    try{
      const r = await fetch(API+'/auth/redeem',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({code:code.value.trim().toUpperCase(),userId:uid,consent:{overseasTransfer:true,dataProcessing:true}})});
      const j = await r.json();
      if(j.status==='active'){ userId=uid; talkView(); }
      else { app.querySelector('#err').textContent = j.error==='invite_not_found'?'유효하지 않은 코드예요':j.error==='invite_already_redeemed'?'이미 사용된 코드예요':j.error||'동의/정원을 확인하세요'; go.disabled=false; }
    }catch(e){ app.querySelector('#err').textContent='서버 연결 실패: '+e; go.disabled=false; }
  };
}

function talkView(){
  const app = document.getElementById('app');
  app.innerHTML = '<div class="hdr"><b>다이키 · 라멘집</b><span id="aff" style="color:var(--pink)">♥ 0</span></div>'
    + '<div class="log" id="log"><button class="btn" style="max-width:200px;margin:30px auto;display:block" id="enter">입장하기</button></div>'
    + '<button class="mic" id="mic" style="display:none">🎤 눌러서 말하기</button>';
  app.querySelector('#enter').onclick = enter;
  app.querySelector('#mic').onclick = onMic;
}

async function resultView(){
  const app=document.getElementById('app');
  app.innerHTML='<div class="center"><div class="sub">결과 정리 중…</div></div>';
  let rm={}; try{ rm=await (await fetch(API+'/session/result?sid='+userId)).json(); }catch(e){}
  const aff=(rm.affinity&&rm.affinity.daiki)||0;
  const n=aff>=6?3:aff>=3?2:1;
  const stars='★★★☆☆'.slice(3-n,6-n);
  const s6=rm.stats6||{};
  const L={pronunciation:'발음',vocabulary:'어휘',grammar:'문법',naturalness:'자연도',speed:'속도',challenge:'도전'};
  const bars=Object.keys(L).map(function(k){var v=Math.round(s6[k]||0);return '<div style="margin:7px 0"><div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:3px"><span>'+L[k]+'</span><span style="color:var(--muted)">'+v+'</span></div><div style="height:7px;background:#eee;border-radius:4px;overflow:hidden"><div style="height:100%;width:'+Math.min(100,v)+'%;background:var(--blue)"></div></div></div>'}).join('');
  const ex=rm.examReadiness||{};
  const jlpt=(ex.jlpt&&ex.jlpt.estimated)||'-';
  const opic=(ex.opic&&ex.opic.estimated)||'-';
  app.innerHTML='<div class="center" style="text-align:center"><h1>완주!</h1><div class="sub">다이키의 라멘집</div>'
    +'<div style="font-size:38px;color:var(--pink);letter-spacing:4px;margin:14px 0">'+stars+'</div>'
    +'<div class="sub" style="margin-bottom:18px">다이키 호감도 ♥ '+aff+'</div>'
    +'<div style="text-align:left;margin:0 0 20px">'+bars+'</div>'
    +'<div style="display:flex;gap:10px;justify-content:center;margin-bottom:22px"><div style="background:#e6f1fb;color:#0c447c;padding:10px 18px;border-radius:12px;font-size:14px">JLPT 추정<br><b style="font-size:18px">'+jlpt+'</b></div><div style="background:#fbeaf0;color:#72243e;padding:10px 18px;border-radius:12px;font-size:14px">OPIc<br><b style="font-size:18px">'+opic+'</b></div></div>'
    +'<button class="btn" onclick="location.reload()">다시 하기</button></div>';
}

function addBubble(res){
  const log = document.getElementById('log');
  const esc = function(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); };
  // [m4] escape 후 ruby 태그만 화이트리스트로 생성 → 후리가나/대사 XSS 차단(향후 UGC 대비)
  let html = res.furigana
    ? esc(res.furigana).replace(/([一-龯々〆ヶ]+)\(([ぁ-んァ-ヶー]+)\)/g,'<ruby>$1<rt>$2</rt></ruby>')
    : esc(res.npcLine);
  if(res.words && res.words.length){ html += '<div class="gloss">'+res.words.map(function(w){return esc(w.w)+' · '+esc(w.gloss);}).join('<br>')+'</div>'; }
  log.appendChild(el('<div class="bubble npc">'+html+'</div>'));
  log.scrollTop=log.scrollHeight;
  document.getElementById('aff').textContent = '♥ '+res.affinity;
  if(res.audioUrl){ try{ new Audio(API+res.audioUrl).play(); }catch(e){} }
}

async function postTurn(blob){
  const r = await fetch(API+'/session/turn?sid='+userId,{method:'POST',headers:{'Content-Type':'application/octet-stream'},body: blob||new Uint8Array(0)});
  return r.json();
}
async function advanceNpc(){
  for(let i=0;i<6;i++){ const res=await postTurn(null); if(res.awaitsUser||res.done){ document.getElementById('aff').textContent='♥ '+res.affinity; if(res.done) setTimeout(resultView,1400); break; } addBubble(res); }
}
async function enter(){
  document.getElementById('enter').remove();
  document.getElementById('mic').style.display='block';
  await advanceNpc();
}
let busy = false;
async function onMic(){
  const mic = document.getElementById('mic');
  if(busy) return; // [m3] 처리 중 재진입(VAD 자동정지 + 버튼 동시) 차단 → 빈 Blob 전송 방지
  if(!rec){
    try{
      const stream = await navigator.mediaDevices.getUserMedia({audio:true});
      recChunks=[]; rec=new MediaRecorder(stream);
      rec.ondataavailable=function(e){ if(e.data.size>0) recChunks.push(e.data); };
      rec.start(); mic.textContent='■ 멈추고 전송'; mic.classList.add('rec');
    }catch(e){ alert('마이크 권한이 필요해요'); }
    return;
  }
  busy=true;
  mic.classList.remove('rec'); mic.textContent='🎤 눌러서 말하기';
  const blob = await new Promise(function(res){ rec.onstop=function(){ rec.stream.getTracks().forEach(function(t){t.stop();}); res(new Blob(recChunks,{type:'audio/webm'})); }; rec.stop(); });
  rec=null;
  const log=document.getElementById('log');
  log.appendChild(el('<div class="bubble you">(내 발화)</div>')); log.scrollTop=log.scrollHeight;
  try{ const res = await postTurn(blob); addBubble(res); if(res.done){ setTimeout(resultView,1400); } else await advanceNpc(); }
  catch(e){ log.appendChild(el('<div class="bubble npc">(오류) '+esc2(e)+'</div>')); }
  finally{ busy=false; }
}
function esc2(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

signupView();
</script>
</body>
</html>
